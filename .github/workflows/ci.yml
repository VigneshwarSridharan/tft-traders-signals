name: CI

on:
  push:
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: tft
          POSTGRES_PASSWORD: tft
          POSTGRES_DB: tft_traders_signals
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U tft"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://tft:tft@localhost:5432/tft_traders_signals
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build shared package
        run: npm run build:shared

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: E2E test (api)
        run: npm run test:e2e --workspace apps/api

      - name: Migrate database up
        run: npm run db:migrate:up --workspace apps/api

      - name: Migrate database down (verify clean rollback)
        run: npm run db:migrate:down --workspace apps/api -- 0

      - name: Migrate database up again
        run: npm run db:migrate:up --workspace apps/api

      - name: Seed database
        run: npm run db:seed --workspace apps/api

      - name: Build
        run: npm run build
